services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vyntrix
# NOTE: frontend usa URLs relativas (mesma origem via nginx). Não precisa VITE_API_URL.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vyntrix

  api:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: api
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - media_data:/app/media
    networks:
      - vyntrix

  worker:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: worker
    volumes:
      - media_data:/app/media
    networks:
      - vyntrix

  worker-scraping:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    command: worker-scraping
    networks:
      - vyntrix

  beat:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    command: beat
    networks:
      - vyntrix

  flower:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
    command: flower
    ports:
      - "127.0.0.1:5555:5555"
    networks:
      - vyntrix

  frontend:
    build:
      context: ..
      dockerfile: frontend.Dockerfile
      args:
        # Vazio = usa mesma origem (nginx proxy /api -> api:8000). NÃO setar aqui.
        VITE_API_URL: ""
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - vyntrix

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
      - frontend
    ports:
      - "8081:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - vyntrix

volumes:
  postgres_data:
  redis_data:
  media_data:

networks:
  vyntrix:
    driver: bridge
