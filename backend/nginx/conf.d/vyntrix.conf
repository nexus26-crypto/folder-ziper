# Substitua "app.seudominio.com" pelo seu domínio real antes do deploy.
# Após configurar, rode certbot para gerar os certificados em /etc/letsencrypt.

server {
  listen 80;
  server_name app.seudominio.com;

  # ACME challenge (certbot)
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name app.seudominio.com;

  ssl_certificate /etc/letsencrypt/live/app.seudominio.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/app.seudominio.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;

  # Security headers
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Frontend React build
  root /usr/share/nginx/html;
  index index.html;

  # API -> FastAPI
  location /api/ {
    proxy_pass http://api:8000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
