# Configuração HTTP-only (acesso via IP durante desenvolvimento).
# Faz proxy pro container `frontend` (TanStack Start SSR) e `api` (FastAPI).

upstream frontend_upstream {
  server frontend:3000;
}

upstream api_upstream {
  server api:8000;
}

server {
  listen 80 default_server;
  server_name _;

  client_max_body_size 20M;

  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # ACME challenge (para futuro certbot)
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # API -> FastAPI
  location /api/ {
    proxy_pass http://api_upstream/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
  }

  # Tudo o resto -> Frontend (TanStack Start SSR)
  location / {
    proxy_pass http://frontend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
  }
}
